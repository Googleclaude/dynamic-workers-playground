name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci) because package-lock.json drifted from package.json
      # when @typescript/vfs, typescript, and vitest were added without
      # regenerating the lockfile. Switch back to `npm ci` once the lockfile
      # is regenerated in a follow-up.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Generate env.d.ts from wrangler.jsonc
        run: npm run types
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: Run vitest suite
        run: npm test
