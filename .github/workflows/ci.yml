name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + lgpd gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: LGPD controller/DPO gate
        run: npm run check:lgpd
      - name: Unit tests
        run: npm test

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Non-blocking signal until the type/lint baseline is green. Flip
  # continue-on-error to false (and add to branch protection) once a
  # `npm run typecheck` and `npm run format` pass have landed.
  static-analysis:
    name: typecheck + lint (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate Worker types
        run: npm run types
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
