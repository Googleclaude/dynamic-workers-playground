name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci) because package-lock.json drifted from package.json
      # when @typescript/vfs, typescript, and vitest were added without
      # regenerating the lockfile. Switch back to `npm ci` once the lockfile
      # is regenerated in a follow-up.
      - run: npm install --no-audit --no-fund
      - run: npm run types
      - run: npx tsc --noEmit
      - run: npm test
