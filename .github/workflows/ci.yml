name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: workflow only reads code, doesn't comment/push/release.
permissions:
  contents: read

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci) because package-lock.json drifted from package.json
      # when @typescript/vfs, typescript, and vitest were added without
      # regenerating the lockfile. Tracked in issue #26.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Generate env.d.ts from wrangler.jsonc
        run: npm run types
      - name: TypeScript type-check
        run: npx tsc --noEmit
      # vitest currently fails with a vite/rolldown plugin binding mismatch
      # ("Missing field `tsconfigPaths`"). Non-fatal until tracked-fixed (issue
      # #28) so the rest of CI still gates type-correctness.
      - name: Run vitest suite (non-blocking)
        continue-on-error: true
        run: npm test
